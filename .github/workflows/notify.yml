name: notify-telegram
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]

# Posts the agent-PR's CI run status to a Telegram chat so the operator
# is paged the moment a green/red run lands on an `agent/...` branch.

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.head_branch != null }}
    steps:
      - name: Send Telegram message
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          STATUS="${{ github.event.workflow_run.conclusion }}"
          URL="${{ github.event.workflow_run.html_url }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [ -z "${TG_TOKEN:-}" ] || [ -z "${TG_CHAT_ID:-}" ]; then
            echo "Telegram secrets not configured; skipping notify."
            exit 0
          fi
          curl -sS --fail-with-body \
            "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d text="CI ${STATUS} on ${BRANCH}: ${URL}"
